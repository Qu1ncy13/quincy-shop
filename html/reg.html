    <link rel="icon" href="../images/icon_noBG.ico">
    <link href="../css/style.css" rel = "stylesheet">
    <link href = "../css/regStyle.css" rel="stylesheet">
</head>

<body>

        <header>
        <div class="container header-inner">  
        <a href="../index.html"> <img src="../images/logo_noBG.png" alt="Quincy Shop" class="logo"></a>

        <nav>
            <ul class="menu">
                <li><a href="catalog.html" class="menu-btn">Каталог</a></li>
                <li><a href="contacts.html" class="menu-btn">Контакты</a></li>

        <a href="../index.html" class = "btn"> Вернуться на главную</a>
        </div>
    </header>


    
    <main> 
        
        <section>
            
            <div class = "container reg">
                <h1>Регистрация</h1>
                <form action="#" method="post">

                    <div class="form-group">
                        <label for = "name"> Имя пользователя</label>
                        <input type = "text" name = "name" id="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email"> Email</label>
                        <input type="email" name="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label for = "password"> Пароль</label>
                        <input type="password" name = "password" id="password" required>
                    </div>
                    
                    <div class="form-group">
                        <label for = "confirm_password">Повторите пароль</label>
                        <input type="password" name = "confirm_password" id = "confirm_password" required>
                    </div>

                    <input type="submit" class="btn">

                    <p> Уже есть аккаунт? <a href = "sign.html" > Войти</a></p>

                </form>
            </div>
        </section>

    </main>





</body>
